name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Override release tag (leave empty to auto-detect latest)"
        required: false
        type: string
  schedule:
    - cron: "0 6 * * *"

env:
  REGISTRY: ghcr.io

jobs:
  check-update:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      release_tag: ${{ steps.check.outputs.release_tag }}
    steps:
      - name: Determine release tag
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ inputs.release_tag }}
          IMAGE: ${{ github.repository }}
        run: |
          # Use manual input tag if provided, otherwise fetch latest
          if [ -n "${INPUT_TAG}" ]; then
            RELEASE_TAG="${INPUT_TAG}"
          else
            RELEASE_TAG=$(curl -fsSL \
              https://raw.githubusercontent.com/astral-sh/uv/main/crates/uv-python/download-metadata.json \
              | jq -r '[.[] | select(.name == "cpython" and .build != null and (.build | test("^20[0-9]{6}$"))) | .build] | max')
          fi
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Latest release tag: ${RELEASE_TAG}"

          # Check if this tag already exists in GHCR
          if docker manifest inspect "ghcr.io/${IMAGE}:${RELEASE_TAG}" > /dev/null 2>&1; then
            echo "Image ghcr.io/${IMAGE}:${RELEASE_TAG} already exists."
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "Manual trigger — forcing rebuild."
              echo "should_build=true" >> "$GITHUB_OUTPUT"
            else
              echo "should_build=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Image not found — build required."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: check-update
    if: needs.check-update.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ needs.check-update.outputs.release_tag }}
            ${{ env.REGISTRY }}/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
